apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-agent
  namespace: devops-agent
  labels:
    app: ai-devops-agent
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-devops-agent
    spec:
      serviceAccountName: devops-agent-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: agent
          image: your-registry/ai-devops-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: devops-agent-secrets
            - configMapRef:
                name: devops-agent-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /agent/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /agent/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
